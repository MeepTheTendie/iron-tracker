version: 2
updates:
  # Enable version updates for Bun
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 2
    reviewers:
      - 'MeepTheTendie'
    assignees:
      - 'MeepTheTendie'
    commit-message:
      prefix: 'deps'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'javascript'
    allow:
      # Allow both direct and indirect dependencies for security
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
    ignore:
      # Ignore major version updates for stability
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      # Ignore minor/patch updates for tanstack to reduce noise
      - dependency-name: '@tanstack/*'
        update-types: ['version-update:semver-minor']
    # Group updates into single PR to reduce spam
    groups:
      react:
        patterns:
          - 'react*'
        dependency-type: 'development'
        update-types: ['version-update:semver-patch']
      tanstack:
        patterns:
          - '@tanstack/*'
        dependency-type: 'development'
        update-types: ['version-update:semver-patch']
