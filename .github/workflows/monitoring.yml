name: Monitoring and Health Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run health checks every 5 minutes
    - cron: '*/5 * * * *'

jobs:
  health-checks:
    name: Health Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - name: Check production health
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" https://iron-tracker.com/api/health)
        if [ $response -ne 200 ]; then
          echo "Production health check failed with status $response"
          exit 1
        fi
        
    - name: Check staging health
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" https://staging.iron-tracker.com/api/health)
        if [ $response -ne 200 ]; then
          echo "Staging health check failed with status $response"
          exit 1
        fi
        
    - name: Notify on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#alerts'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  performance-monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Run Lighthouse CI
      run: |
        npm install -g @lhci/cli@0.13.x
        lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        
    - name: Bundle size analysis
      run: |
        npx vite-bundle-analyzer dist/
        du -sh dist/
        
    - name: Core Web Vitals
      run: |
        npm install -g web-vitals
        npm run perf

  security-monitoring:
    name: Security Monitoring
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Run security scan
      run: |
        npm audit --audit-level=moderate
        npx snyk test --severity-threshold=high
        
    - name: Check for vulnerabilities
      uses: securecodewarrior/github-action-add-sarif@v1
      with:
        sarif-file: 'security-scan-results.sarif'

  uptime-monitoring:
    name: Uptime Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - name: Check application uptime
      run: |
        # Check main application
        curl -f https://iron-tracker.com/ || exit 1
        curl -f https://iron-tracker.com/api/health || exit 1
        
        # Check key endpoints
        curl -f https://iron-tracker.com/history || exit 1
        curl -f https://iron-tracker.com/workout || exit 1
        
        # Check performance
        response_time=$(curl -o /dev/null -s -w "%{time_total}" https://iron-tracker.com/)
        if (( $(echo "$response_time > 2.0" | bc -l) )); then
          echo "Response time too high: ${response_time}s"
          exit 1
        fi

  error-tracking:
    name: Error Tracking
    runs-on: ubuntu-latest
    
    steps:
    - name: Check error rates
      run: |
        # This would integrate with your error tracking service
        # Example: Sentry, LogRocket, etc.
        echo "Checking error rates from monitoring service..."
        
    - name: Alert on high error rates
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        message: "High error rate detected!"
        channel: '#alerts'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}